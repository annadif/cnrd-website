<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Articles - CNRD</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <!-- header (same design) -->
  <div class="container-fluid text-white pt-4 pb-4 d-none d-lg-flex" style="background-color: #1111ab;">
    <div class="container pb-2">
      <div class="d-flex align-items-center justify-content-start">
        <img src="img/logo.jpeg" alt="Logo CNRD" style="height: 80px; width: auto; margin-right: 20px;">
        <a href="index.html" class="h1 mb-0" style="color:#FFD300">CNRD</a>
      </div>
    </div>
  </div>
  <div class="container-fluid sticky-top"><div class="container"><nav class="navbar navbar-expand-lg navbar-light bg-white py-lg-0 px-lg-3"><a href="index.html" class="navbar-brand d-lg-none"><h1 class="text-primary m-0">CNRD</h1></a></nav></div></div>

  <div class="container-fluid page-header py-5 mb-5"><div class="container text-center"><h1 class="display-4 text-white mb-3">Articles — Liste</h1></div></div>

  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-column flex-md-row gap-2">
      <h2 class="h4 mb-0">Articles</h2>
      <div class="d-flex gap-2 flex-column flex-sm-row w-100 w-md-auto">
        <a class="btn btn-outline-secondary btn-sm w-100 w-md-auto" href="admin.html?skipAuth=1">Retour</a>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-bordered" id="articles-only-table">
        <thead class="table-light">
          <tr><th>Auteur</th><th>Thème</th><th>Date de Publication</th><th>Numéro</th><th>Serie</th><th>PDF</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- footer -->
  <div class="container-fluid footer position-relative bg-dark text-white-50 py-5"><div class="container"><div class="row g-5 py-5"><div class="col-lg-6"><a href="index.html" class="navbar-brand"><h1 class="h1 mb-0" style="color:#FFD300">CNRD</h1></a></div></div></div></div>

  <script>
    function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
    async function loadArticlesOnly(){
      try {
        const res = await fetch('db-connect.php?action=list_articles', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const rows = await res.json();
        const tbody = document.querySelector('#articles-only-table tbody');
        tbody.innerHTML = rows.map(r => `
          <tr>
            <td>${escapeHtml(r['Auteur'])}</td>
            <td>${escapeHtml(r['Thème'])}</td>
            <td>${r['Date de Publication'] ? new Date(r['Date de Publication']).toLocaleDateString() : ''}</td>
            <td>${escapeHtml(r['Numéro'])}</td>
            <td>${escapeHtml(r['Serie'])}</td>
            <td>${r['PDF'] ? `<a class="btn btn-sm btn-outline-primary" href="${escapeHtml(r['PDF'])}" target="_blank">Ouvrir</a>` : 'N/A'}</td>
          </tr>
        `).join('') || '<tr><td colspan="6" class="text-center">Aucun enregistrement</td></tr>';
      } catch(e){
        document.querySelector('#articles-only-table tbody').innerHTML = '<tr><td colspan="6" class="text-danger">Erreur: ' + e.message + '</td></tr>';
        console.error(e);
      }
    }
    loadArticlesOnly();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
